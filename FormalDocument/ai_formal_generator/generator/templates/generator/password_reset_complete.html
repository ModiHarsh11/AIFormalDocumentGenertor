{% extends "generator/base.html" %}
{% block title %}Password Updated — BISAG-N{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="card card-bisag p-4" style="max-width:560px;margin:0 auto;">
        <div class="text-center mb-3">
            <div style="width:60px;height:60px;background:#2c3e50;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;">
                <i class="bi bi-check-circle-fill text-white fs-3"></i>
            </div>
            <h4 class="fw-bold">Password Updated</h4>
        </div>

        <p class="text-muted mb-3">
            Your password has been reset successfully. You can now sign in with your new password.
        </p>

        <div class="text-center">
            <a href="{% url 'login' %}" class="btn btn-bisag">Go to Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
