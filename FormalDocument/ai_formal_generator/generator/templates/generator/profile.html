{% extends "generator/base.html" %}
{% block title %}My Profile — BISAG-N{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:680px;">
    <h4 class="fw-bold mb-4" style="color:#2c3e50;"><i class="bi bi-person-circle me-2"></i>My Profile</h4>

    <!-- Stats -->
    <div class="row g-3 mb-4">
        <div class="col-4">
            <div class="card card-bisag text-center py-3">
                <div class="fs-3 fw-bold text-primary">{{ doc_count }}</div>
                <div class="text-muted small">Documents Generated</div>
            </div>
        </div>
        <div class="col-4">
            <div class="card card-bisag text-center py-3">
                <div class="fs-5 fw-bold" style="color:#2c3e50;">{{ user.username }}</div>
                <div class="text-muted small">Username</div>
            </div>
        </div>
        <div class="col-4">
            <div class="card card-bisag text-center py-3">
                <div class="fs-5 fw-bold text-success">Active</div>
                <div class="text-muted small">Account Status</div>
            </div>
        </div>
    </div>

    <!-- Profile Update Form -->
    <div class="card card-bisag p-4 mb-4">
        <h6 class="fw-bold mb-3" style="color:#2c3e50;"><i class="bi bi-pencil-square me-2"></i>Edit Profile</h6>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="profile">
            <div class="row g-3">
                <div class="col-6">
                    <label class="form-label fw-semibold">First Name</label>
                    <input type="text" name="first_name" class="form-control" value="{{ user.first_name }}">
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">Last Name</label>
                    <input type="text" name="last_name" class="form-control" value="{{ user.last_name }}">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ user.email }}">
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">Department</label>
                    <input type="text" name="department" class="form-control" value="{{ profile.department }}">
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">Designation</label>
                    <input type="text" name="designation" class="form-control" value="{{ profile.designation }}">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-bisag px-4">Save Changes</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Change Password -->
    <div class="card card-bisag p-4">
        <h6 class="fw-bold mb-3" style="color:#2c3e50;"><i class="bi bi-shield-lock me-2"></i>Change Password</h6>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="action" value="password">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label fw-semibold">Current Password</label>
                    <input type="password" name="old_password" class="form-control" required>
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">New Password</label>
                    <input type="password" name="new_password1" class="form-control" required>
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold">Confirm New Password</label>
                    <input type="password" name="new_password2" class="form-control" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-outline-secondary px-4">Change Password</button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
