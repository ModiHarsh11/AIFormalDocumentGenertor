{% extends "generator/base.html" %}
{% block title %}Reset Password — BISAG-N{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="card card-bisag p-4" style="max-width:520px;margin:0 auto;">
        <div class="text-center mb-4">
            <div style="width:60px;height:60px;background:#2c3e50;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px;">
                <i class="bi bi-key-fill text-white fs-3"></i>
            </div>
            <h4 class="fw-bold">Forgot Password</h4>
            <p class="text-muted small mb-0">Enter your account email and we will send you a reset link.</p>
        </div>

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_email" class="form-label fw-semibold">Email</label>
                <input type="email" name="email" maxlength="254" required id="id_email" class="form-control" placeholder="your@email.com">
            </div>
            <button type="submit" class="btn btn-bisag w-100 py-2 fw-semibold">
                <i class="bi bi-send me-2"></i>Send Reset Link
            </button>
        </form>

        <hr class="my-3">
        <div class="text-center text-muted small">
            Back to <a href="{% url 'login' %}" class="text-decoration-none fw-semibold" style="color:#2c3e50">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
